name: build-deb-and-push

# 手動觸發。填好 inputs 後跑：build .deb -> 放進 image -> push Docker Hub。
on:
  workflow_dispatch:
    # 注意：GitHub 的 workflow_dispatch inputs 上限是 10 個，這裡刻意控制在 9 個。
    # 進階旋鈕（apt_build_deps / pkg_version / ubuntu_version / source_ref）不放表單，
    # 改成寫在 recipes/*.env 裡。常用目標建議直接用 recipe，表單只填 mode + recipe + image_tag。
    inputs:
      mode:
        description: "Build 模式（用了 recipe 時以 recipe 內的 MODE 為準）"
        required: true
        type: choice
        options: [url, dpkg, fpm, go]
        default: url
      recipe:
        description: "懶人包：recipes/ 下的設定檔名（podman-exporter / gvisor / dbgsym-kernel）。填了就幾乎不用填下面其他欄位。"
        required: false
        type: string
        default: ""
      source_repo:
        description: "【dpkg/fpm/go】要 build 的 GitHub repo：owner/name，可加分支/tag → owner/name@v1.2"
        required: false
        type: string
        default: ""
      deb_urls:
        description: "【url】現成 .deb/.ddeb 連結，逗號或換行分隔"
        required: false
        type: string
        default: ""
      build_cmd:
        description: "【fpm/go】build 指令，例如 make binary"
        required: false
        type: string
        default: ""
      bin_paths:
        description: "【fpm/go】要打包的產物 src=dest，逗號分隔，例如 bin/app=/usr/bin/app"
        required: false
        type: string
        default: ""
      pkg_name:
        description: "【fpm/go】套件名稱，預設取 repo 名"
        required: false
        type: string
        default: ""
      image_tag:
        description: "最終 image tag，例如 myorg/scan-target:6.17.0-20。留空＝用 mode+時間自動命名"
        required: false
        type: string
        default: ""
      push:
        description: "是否 push 到 Docker Hub（false＝只 build 測試不推）"
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the builder image
        run: docker build -f Dockerfile.builder -t deb-builder:local .

      - name: Run builder to produce .deb
        run: |
          mkdir -p out
          docker run --rm \
            -v "${{ github.workspace }}/out:/out" \
            -e MODE="${{ inputs.mode }}" \
            -e RECIPE="${{ inputs.recipe }}" \
            -e SOURCE_REPO="${{ inputs.source_repo }}" \
            -e DEB_URLS="${{ inputs.deb_urls }}" \
            -e BUILD_CMD="${{ inputs.build_cmd }}" \
            -e BIN_PATHS="${{ inputs.bin_paths }}" \
            -e PKG_NAME="${{ inputs.pkg_name }}" \
            deb-builder:local

      - name: Show produced packages
        run: ls -lh out/

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debs
          # 同時收 .deb 與 .ddeb（dbgsym 保留原始副檔名）
          path: |
            out/*.deb
            out/*.ddeb
          if-no-files-found: warn

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ secrets.DOCKERHUB_USERNAME }}/deb-scan-target:${{ inputs.mode }}-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push scan-target image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.image
          push: ${{ inputs.push }}
          tags: ${{ steps.tag.outputs.tag }}

      - name: Summary
        run: |
          echo "### Build 完成 :package:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: \`${{ inputs.mode }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pushed: \`${{ inputs.push }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Packages:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -lh out/ >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
