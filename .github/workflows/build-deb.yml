name: build-deb-and-push

# 手動觸發。填好 inputs 後跑：build .deb -> 放進 image -> push Docker Hub。
on:
  workflow_dispatch:
    # 注意：GitHub 的 workflow_dispatch inputs 上限是 10 個，這裡是 9 個。
    # 不放表單的：image tag（固定自動命名，見 Resolve image tag）、ubuntu_version
    # （固定 24.04，要改改 Dockerfile 的 ARG）、pkg_version（自動 0.0.0+日期）。
    # 憑證一律走 repo Secrets（DOCKERHUB_USERNAME/TOKEN），不開放當 input 填——
    # 因為 workflow_dispatch 的 input 值會顯示在 run 頁面，等於把 token 公開。
    inputs:
      mode:
        # choice 無法逐項說明，這裡用 description 當「決策指引」。
        description: >-
          怎麼選？ 有現成 .deb/.ddeb 連結 → url ｜ 原始 repo 內有 debian/ 目錄 → dpkg ｜
          Go 專案（有 go.mod）→ go ｜ 其它語言、要自己編譯再打包成 deb → fpm。
        required: true
        type: choice
        options: [url, dpkg, fpm, go]
        default: url
      source_repo:
        description: "【dpkg/fpm/go】要 build 的 GitHub repo：owner/name，可加分支/tag → owner/name@v1.2"
        required: false
        type: string
        default: ""
      deb_urls:
        description: "【url】現成 .deb/.ddeb 連結，逗號或換行分隔"
        required: false
        type: string
        default: ""
      build_cmd:
        description: "【fpm/go】build 指令，例如 make binary 或 go build -o app ."
        required: false
        type: string
        default: ""
      bin_paths:
        description: "【fpm/go】要打包的產物 src=dest，逗號分隔，例如 bin/app=/usr/bin/app"
        required: false
        type: string
        default: ""
      apt_build_deps:
        description: "（進階，多半留空）額外要先 apt install 的 build 相依，空白分隔。CGO 專案常需要，例如 libgpgme-dev pkg-config"
        required: false
        type: string
        default: ""
      pkg_name:
        description: "【fpm/go】套件名稱，預設取 repo 名"
        required: false
        type: string
        default: ""
      go_version:
        description: "（進階，多半留空）【go】指定 Go 版本，例如 1.25.0；留空＝預設。專案 go.mod 需要較新版時才填"
        required: false
        type: string
        default: ""
      push:
        description: "是否 push 到 Docker Hub（預設 false＝只 build 測試不推；要推需先在本 repo 設好 Secrets）"
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the builder image
        run: docker build -f Dockerfile.builder -t deb-builder:local .

      - name: Run builder to produce .deb
        run: |
          mkdir -p out
          docker run --rm \
            -v "${{ github.workspace }}/out:/out" \
            -e MODE="${{ inputs.mode }}" \
            -e SOURCE_REPO="${{ inputs.source_repo }}" \
            -e DEB_URLS="${{ inputs.deb_urls }}" \
            -e BUILD_CMD="${{ inputs.build_cmd }}" \
            -e BIN_PATHS="${{ inputs.bin_paths }}" \
            -e APT_BUILD_DEPS="${{ inputs.apt_build_deps }}" \
            -e PKG_NAME="${{ inputs.pkg_name }}" \
            -e GO_VERSION="${{ inputs.go_version }}" \
            deb-builder:local

      - name: Show produced packages
        run: ls -lh out/

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debs
          # 同時收 .deb 與 .ddeb（dbgsym 保留原始副檔名）
          path: |
            out/*.deb
            out/*.ddeb
          if-no-files-found: warn

      - name: Resolve image tag
        id: tag
        # 固定自動命名為  <DockerHub帳號>/toeduker:<產品名>-<時間>，不開放表單客製。
        # 產品名取自實際產出的套件檔名（Debian 慣例 name_version_arch.deb，取第一個底線前）；
        # 沒有底線的（如 runsc.deb）就去掉副檔名。多個 deb 取第一個。
        run: |
          pkg_file="$(ls -1 out/*.deb out/*.ddeb 2>/dev/null | head -n1)"
          base="$(basename "${pkg_file:-package}")"
          if [ -z "$pkg_file" ]; then
            product="package"
          elif case "$base" in *_*) true;; *) false;; esac; then
            product="${base%%_*}"
          else
            product="${base%.*}"
          fi
          # 清掉 docker tag 不允許的字元，保險
          product="$(echo "$product" | tr -c 'a-zA-Z0-9_.-' '-' | sed 's/-*$//')"
          # namespace 取自 Secret；沒設（例如 push=false 的乾跑）就用無 namespace 的本地 tag，
          # 避免產生 "/toeduker:..." 這種不合法的 image 名稱。
          ns="${{ secrets.DOCKERHUB_USERNAME }}"
          if [ -n "$ns" ]; then repo="$ns/toeduker"; else repo="toeduker"; fi
          tag="${repo}:${product}-$(date +%Y%m%d-%H%M%S)"
          echo "由產出套件 '$base' 推得產品名 '$product' → image: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check push prerequisites
        if: ${{ inputs.push }}
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # 額外把帳號也登記成遮罩（token 來自 Secret 本就會自動遮，帳號順手保護）。
          [ -n "$DH_USER" ] && echo "::add-mask::$DH_USER" || true
          if [ -z "$DH_USER" ] || [ -z "$DH_TOKEN" ]; then
            echo "::error::push=true 但本 repo 沒有設定 DOCKERHUB_USERNAME / DOCKERHUB_TOKEN。"
            echo "::error::請到「你自己的 repo」Settings → Secrets and variables → Actions 設定後再跑；"
            echo "::error::或把 push 設成 false 只做 build 驗證。憑證不要當 input 填（會顯示在 run 頁面）。"
            exit 1
          fi

      - name: Log in to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push scan-target image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.image
          push: ${{ inputs.push }}
          tags: ${{ steps.tag.outputs.tag }}

      - name: Summary
        run: |
          echo "### Build 完成 :package:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: \`${{ inputs.mode }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pushed: \`${{ inputs.push }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Packages:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -lh out/ >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
