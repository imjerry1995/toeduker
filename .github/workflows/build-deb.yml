name: build-deb-and-push

# 手動觸發。填好 inputs 後跑：build .deb -> 放進 image -> push Docker Hub。
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build 模式"
        required: true
        type: choice
        options: [dpkg, fpm, url, go]
        default: url
      recipe:
        description: "（可選）使用 recipes/ 下的預設設定檔名，例如 podman-exporter / gvisor / dbgsym-kernel。填了會覆寫部分下列欄位。"
        required: false
        type: string
        default: ""
      source_repo:
        description: "要 build 的 GitHub repo（owner/name 或完整 URL）。dpkg/fpm/go 模式需要。"
        required: false
        type: string
        default: ""
      source_ref:
        description: "branch / tag / commit（預設 default branch）"
        required: false
        type: string
        default: ""
      deb_urls:
        description: "url 模式：現成 .deb 連結，逗號或換行分隔"
        required: false
        type: string
        default: ""
      build_cmd:
        description: "fpm/go 模式：build 指令，例如 'make binary'"
        required: false
        type: string
        default: ""
      bin_paths:
        description: "fpm/go 模式：要打包的產物 src=dest，逗號分隔"
        required: false
        type: string
        default: ""
      apt_build_deps:
        description: "額外 apt build 相依（空白分隔），CGO 專案常需要"
        required: false
        type: string
        default: ""
      pkg_name:
        description: "套件名稱（fpm/go），預設取 repo 名"
        required: false
        type: string
        default: ""
      pkg_version:
        description: "套件版本（fpm/go），預設 0.0.0+日期"
        required: false
        type: string
        default: ""
      ubuntu_version:
        description: "base image 的 Ubuntu 版本"
        required: false
        type: string
        default: "24.04"
      image_tag:
        description: "最終 image tag，例如 myorg/scan-target:6.17.0-20。預設用 mode+時間"
        required: false
        type: string
        default: ""
      push:
        description: "是否 push 到 Docker Hub（false 則只 build 測試）"
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the builder image
        run: |
          docker build \
            --build-arg UBUNTU_VERSION="${{ inputs.ubuntu_version }}" \
            -f Dockerfile.builder -t deb-builder:local .

      - name: Run builder to produce .deb
        run: |
          mkdir -p out
          docker run --rm \
            -v "${{ github.workspace }}/out:/out" \
            -e MODE="${{ inputs.mode }}" \
            -e RECIPE="${{ inputs.recipe }}" \
            -e SOURCE_REPO="${{ inputs.source_repo }}" \
            -e SOURCE_REF="${{ inputs.source_ref }}" \
            -e DEB_URLS="${{ inputs.deb_urls }}" \
            -e BUILD_CMD="${{ inputs.build_cmd }}" \
            -e BIN_PATHS="${{ inputs.bin_paths }}" \
            -e APT_BUILD_DEPS="${{ inputs.apt_build_deps }}" \
            -e PKG_NAME="${{ inputs.pkg_name }}" \
            -e PKG_VERSION="${{ inputs.pkg_version }}" \
            deb-builder:local

      - name: Show produced packages
        run: ls -lh out/

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debs
          path: out/*.deb

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ secrets.DOCKERHUB_USERNAME }}/deb-scan-target:${{ inputs.mode }}-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push scan-target image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.image
          build-args: |
            UBUNTU_VERSION=${{ inputs.ubuntu_version }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tag.outputs.tag }}

      - name: Summary
        run: |
          echo "### Build 完成 :package:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: \`${{ inputs.mode }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pushed: \`${{ inputs.push }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Packages:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -lh out/ >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
